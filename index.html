<body>

                <thead><tr><th>Lectura</th><th>P1</th><th>P2</th><th>P3</th></tr></thead>

                    <!-- se llena con JS desde claveRespuestas -->
                </tbody>
            </table>

<script>
(function() {
    // --------------------------------------------------------------
    // BASE DE DATOS - 15 LECTURAS (texto, preguntas, opciones)
    // --------------------------------------------------------------
    const lecturas = [
        { // 1. Dilema tecnología
            titulo: "Lectura 1: El dilema de la tecnología y el individuo",
            subtitulo: "Fragmento de 'La Sociedad del Rendimiento'",
            texto: `En la era digital, la coerción no proviene de un poder externo y visible (como el panóptico foucaultiano), sino de una presión interna autoimpuesta: la necesidad constante de rendir y ser productivo. La sociedad contemporánea ha transitado de ser una sociedad disciplinaria, basada en la prohibición y el deber, a una sociedad de rendimiento, basada en la optimización y el "poder hacer". Este cambio es sutilmente peligroso, ya que el individuo, al ser su propio explotador bajo la ilusión de la libertad, nunca se siente agotado por la exigencia de un jefe, sino por su propia incapacidad percibida para alcanzar metas ilimitadas. La patología dominante de esta época, como el síndrome de burnout (agotamiento), no es un signo de opresión externa, sino del fracaso del yo en la auto-explotación.`,
            preguntas: [
                { pregunta: "¿Cuál es la tesis central que el autor desarrolla en el texto?", opciones: ["A) La tecnología ha hecho que los jefes sean menos exigentes.", "B) El peligro actual radica en la auto-explotación del individuo bajo la presión de la productividad.", "C) Las sociedades disciplinarias generaban menos casos de burnout.", "D) La única forma de libertad es abandonar la era digital."] },
                { pregunta: "Según el autor, ¿cuál es la causa fundamental del síndrome de burnout en la sociedad de rendimiento?", opciones: ["A) La falta de regulación gubernamental sobre las horas de trabajo.", "B) El fracaso del individuo en alcanzar las expectativas ilimitadas que se autoimpone.", "C) El control excesivo por parte de las estructuras de poder tradicionales.", "D) La prohibición de ciertas actividades placenteras y de ocio."] },
                { pregunta: "El tono general del fragmento es:", opciones: ["A) Optimista y de celebración por las nuevas libertades laborales.", "B) Crítico y analítico respecto a las dinámicas de poder contemporáneas.", "C) Descriptivo, solo enunciando hechos sobre el mercado de trabajo.", "D) Nostálgico, añorando la antigua sociedad disciplinaria."] }
            ]
        },
        { // 2. Exoplanetas
            titulo: "Lectura 2: El fenómeno de las exoplanetas habitables",
            subtitulo: "Zona de Habitabilidad",
            texto: `El concepto de Zona de Habitabilidad (ZH), o zona Ricitos de Oro, se refiere a la región orbital alrededor de una estrella donde la temperatura permite que el agua líquida exista en la superficie de un planeta. El agua líquida es considerada esencial para la vida tal como la conocemos. La ZH depende fundamentalmente de la luminosidad y el tamaño de la estrella: cuanto más caliente es la estrella, más lejos debe estar el planeta. Sin embargo, la presencia de un exoplaneta en la ZH no garantiza la habitabilidad. Un factor crucial es la composición atmosférica del planeta, ya que un exceso de gases de efecto invernadero (como el CO2) puede sobrecalentarlo (efecto invernadero descontrolado, como en Venus), incluso si está en una órbita favorable. Por otro lado, una atmósfera demasiado delgada (como en Marte) impide la retención de calor y presión. Por lo tanto, el estudio de exoplanetas habitables requiere un análisis químico y geológico detallado, además de su posición orbital.`,
            preguntas: [
                { pregunta: "¿Cuál es la idea principal que el autor busca refutar o matizar?", opciones: ["A) Que el agua líquida es indispensable para la vida.", "B) Que la Zona de Habitabilidad es el único criterio para determinar la vida extraterrestre.", "C) Que todas las estrellas son del mismo tamaño y luminosidad.", "D) Que el CO2 es beneficioso para la temperatura superficial de los planetas."] },
                { pregunta: "¿Qué función tiene el CO2 en el contexto de la habitabilidad planetaria, según el texto?", opciones: ["A) Es siempre necesario para retener la presión atmosférica.", "B) Es un factor que, en exceso, puede anular la habitabilidad de un planeta.", "C) Es el componente principal de las atmósferas de los planetas gigantes.", "D) No tiene ningún impacto significativo en la temperatura superficial."] },
                { pregunta: "El texto clasifica la atmósfera de un planeta como 'factor crucial' porque:", opciones: ["A) Es la única cosa que puede observarse desde la Tierra.", "B) Determina la presión y la retención de calor necesarias para el agua líquida.", "C) Es la fuente principal del agua superficial.", "D) Influye en la órbita del planeta alrededor de su estrella."] }
            ]
        },
        { // 3. Imprenta
            titulo: "Lectura 3: La invención de la imprenta y la ruptura epistemológica",
            subtitulo: "",
            texto: `La invención de la imprenta de tipos móviles por Johannes Gutenberg a mediados del siglo XV no fue simplemente una mejora tecnológica en la reproducción de textos, sino un agente catalizador de una profunda ruptura en la forma en que se construye y se distribuye el conocimiento. Antes de la imprenta, la información era escasa, costosa y controlada por instituciones centralizadas (monasterios y universidades). La lectura era un acto público y oral, mediado por un sacerdote o un lector culto. Con la imprenta, el libro se democratiza, se vuelve reproducible en masa y, crucialmente, económico. Esto no solo dispara la alfabetización, sino que promueve una lectura silenciosa e individualizada. Este cambio, que puede parecer menor, es fundamental: el conocimiento pasa de ser una doctrina colectiva a una experiencia personal e íntima. Se fomenta la crítica, la interpretación individual de textos religiosos (facilitando la Reforma Protestante) y el surgimiento de las ciencias modernas al permitir una rápida difusión y verificación de hallazgos.`,
            preguntas: [
                { pregunta: "¿Cuál es la principal transformación epistemológica que el autor atribuye a la imprenta?", opciones: ["A) Permitió la rápida traducción de textos del latín al alemán.", "B) Cambió la construcción del conocimiento de una doctrina colectiva a una experiencia crítica e individual.", "C) Redujo el costo de los libros a niveles insignificantes para la población.", "D) Fomentó exclusivamente la lectura pública en plazas y ayuntamientos."] },
                { pregunta: "La frase 'lectura silenciosa e individualizada' implicó el surgimiento de:", opciones: ["A) La dependencia total del clero para entender los textos sagrados.", "B) Un pensamiento crítico y una interpretación personal de la información.", "C) La necesidad de construir bibliotecas públicas.", "D) El retorno a la tradición oral como fuente de conocimiento."] },
                { pregunta: "¿Qué se puede inferir sobre el papel de la Iglesia antes de la invención de Gutenberg?", opciones: ["A) Promovía la distribución masiva de libros a bajo costo.", "B) Era la principal entidad que controlaba el acceso y la interpretación del conocimiento.", "C) Fomentaba la alfabetización en todas las clases sociales.", "D) Utilizaba el conocimiento para apoyar el desarrollo de las ciencias modernas."] }
            ]
        },
        { // 4. Mano invisible
            titulo: "Lectura 4: La falacia de la 'mano invisible' en el mercado",
            subtitulo: "",
            texto: `Desde la economía clásica, la metáfora de la "mano invisible" de Adam Smith sugiere que la búsqueda del interés individual en un mercado libre conduce inevitablemente al bienestar social colectivo. Sin embargo, los críticos modernos argumentan que esta falacia ignora una realidad fundamental: los llamados efectos externos o externalidades. Una externalidad ocurre cuando la producción o el consumo de un bien afecta a terceros que no están involucrados en la transacción. Por ejemplo, una fábrica que maximiza su beneficio (interés individual) puede contaminar un río (efecto externo), obligando a la comunidad circundante a pagar los costos de salud o de limpieza. En este caso, la búsqueda del beneficio individual no maximiza el bienestar social, sino que lo reduce. La "mano invisible", por lo tanto, no es inherentemente benéfica, sino que requiere una "mano visible" (regulación o impuestos) para internalizar los costos ambientales y sociales y así alinear el interés privado con el bien público.`,
            preguntas: [
                { pregunta: "¿Cuál es el principal argumento que el autor utiliza para criticar la 'mano invisible'?", opciones: ["A) Los mercados libres siempre llevan al colapso económico.", "B) La teoría es demasiado antigua para ser relevante hoy en día.", "C) La metáfora ignora las 'externalidades', donde el beneficio privado perjudica a terceros.", "D) Adam Smith no consideró la existencia de monopolios."] },
                { pregunta: "Un ejemplo de externalidad negativa, según el texto, es:", opciones: ["A) La inversión en una nueva maquinaria para aumentar la producción.", "B) La contaminación de un río causada por una fábrica.", "C) La competencia entre dos empresas por los mismos clientes.", "D) La reducción de costos operativos internos de una empresa."] },
                { pregunta: "¿Qué solución propone el autor para mitigar la falacia de la 'mano invisible'?", opciones: ["A) Dejar que el mercado se regule completamente sin intervención.", "B) La internalización de los costos mediante la regulación o impuestos.", "C) Prohibir cualquier tipo de búsqueda de interés individual.", "D) Crear una nueva metáfora económica para reemplazar la de Smith."] }
            ]
        },
        { // 5. Weltanschauung
            titulo: "Lectura 5: El concepto de Weltanschauung",
            subtitulo: "",
            texto: `El término alemán Weltanschauung, traducido comúnmente como "cosmovisión" o "visión del mundo", es fundamental en la filosofía y la crítica cultural. No se refiere simplemente a la suma de las creencias de un individuo, sino al marco estructurado de ideas y valores a través del cual una cultura, un grupo social o una persona interpreta la realidad. Esta visión opera como un prisma que filtra la percepción, confiere significado a los eventos y orienta la acción moral. Por ejemplo, una Weltanschauung científica priorizará la evidencia empírica y la razón; una Weltanschauung religiosa, la fe y la tradición. El gran desafío de la modernidad tardía es el fenómeno de la fragmentación, donde las grandes narrativas culturales se erosionan, llevando a menudo a un pluralismo de Weltanschauungen o, peor aún, a una ausencia de marcos coherentes para la comprensión del mundo.`,
            preguntas: [
                { pregunta: "¿Cuál de las siguientes opciones describe mejor el significado de Weltanschauung?", opciones: ["A) Un conjunto aleatorio de opiniones personales sobre el clima.", "B) La suma total de conocimientos científicos de una época.", "C) Un marco estructurado de ideas y valores que filtra e interpreta la realidad.", "D) La forma en que se habla el idioma alemán."] },
                { pregunta: "Según el texto, el gran desafío de la modernidad tardía es la 'fragmentación', lo cual lleva a:", opciones: ["A) Una única y coherente cosmovisión global.", "B) La consolidación de las narrativas culturales.", "C) La erosión de las grandes narrativas y la posible ausencia de marcos coherentes.", "D) Un retorno a la cosmovisión religiosa como única opción."] },
                { pregunta: "El término 'prisma' se utiliza en el texto como metáfora para:", opciones: ["A) Un objeto caro de cristal utilizado para decorar.", "B) Un mecanismo que descompone la realidad en sus elementos básicos.", "C) Un marco conceptual o filtro que media la percepción e interpretación de la realidad.", "D) Un obstáculo que impide que la luz llegue a la verdad."] }
            ]
        },
        { // 6. Neuroplasticidad (sintetizada)
            titulo: "Lectura 6: Neuroplasticidad y música",
            subtitulo: "",
            texto: `La práctica musical constituye uno de los estímulos más complejos para el cerebro. Ejecutar un instrumento requiere integrar información visual, auditiva y motora en fracciones de segundo. Diversos estudios de neuroimagen han demostrado que los músicos profesionales presentan un cuerpo calloso más desarrollado, lo que facilita la comunicación entre hemisferios. Esta capacidad de adaptación y reorganización del cerebro se conoce como neuroplasticidad. La música no solo mejora habilidades motoras finas, sino que optimiza funciones ejecutivas y de memoria.`,
            preguntas: [
                { pregunta: "¿Cuál es la tesis principal del autor respecto a la música?", opciones: ["A) La música es la única actividad que incrementa la materia gris.", "B) La música es un estímulo potente para la neuroplasticidad y la optimización cognitiva.", "C) El cuerpo calloso solo crece en músicos profesionales de instrumentos de cuerda.", "D) La ejecución de un instrumento solo mejora las habilidades motoras finas."] },
                { pregunta: "¿Qué función cumple el cuerpo calloso en el contexto de esta investigación?", opciones: ["A) Es el área donde se almacena la memoria a corto plazo.", "B) Es la estructura cerebral responsable de conectar ambos hemisferios.", "C) Es el área que controla las habilidades motoras finas de los dedos.", "D) Es el centro de procesamiento auditivo del sonido."] },
                { pregunta: "Se puede inferir del texto que la neuroplasticidad es:", opciones: ["A) Una condición que solo afecta a los niños menores de cinco años.", "B) La rigidez estructural del cerebro en la vejez.", "C) La capacidad de adaptación y reorganización del cerebro ante nuevas experiencias.", "D) Una enfermedad neurológica causada por el estrés."] }
            ]
        },
        { // 7. Voto informado
            titulo: "Lectura 7: La paradoja del voto informado en la democracia",
            subtitulo: "",
            texto: `Idealmente, la democracia requiere ciudadanos informados que tomen decisiones racionales al momento de votar. Sin embargo, en la práctica, los costos de adquirir información política relevante suelen superar los beneficios individuales esperados. Este fenómeno se conoce como el problema de la "ignorancia racional". Un solo voto tiene una probabilidad estadísticamente insignificante de cambiar el resultado de una elección. Por lo tanto, desde una perspectiva puramente económica, invertir tiempo y esfuerzo en investigar a todos los candidatos y sus propuestas es una decisión irracional para el votante promedio. Es más rentable destinar ese tiempo a actividades que mejoren directamente la vida del individuo (trabajar, descansar, etc.). Esta ignorancia racional explica por qué muchos votantes confían en atajos (heurísticas) como la afiliación partidista, el atractivo de los candidatos o la información simplificada de los medios, en lugar de realizar una investigación exhaustiva.`,
            preguntas: [

            texto: `Contrario a la creencia popular de que tener más opciones es siempre mejor, la investigación en psicología conductual ha revelado la "paradoja de la elección". Si bien un número limitado de opciones es beneficioso, un exceso de alternativas puede conducir a la parálisis de la decisión, haciendo que el consumidor se sienta abrumado e incapaz de elegir. Más allá de la parálisis, el exceso de elección también reduce la satisfacción posterior. Cuando finalmente se toma una decisión entre muchas, el individuo tiende a lamentarse por las opciones no elegidas (fear of missing out o FOMO) y a culpar a la complejidad del proceso. El punto óptimo, por lo tanto, no es la maximización de la elección, sino la satisfacción (o satisficing, término acuñado por Herbert Simon) que se logra al escoger una opción lo "suficientemente buena".`,

            texto: `Históricamente, el valor de la moneda estaba ligado al estándar oro: cada unidad de papel moneda representaba una cantidad fija de metal precioso en las reservas de un banco central. Este sistema limitaba la inflación, ya que el gobierno no podía simplemente imprimir más dinero del que respaldaba en oro. Sin embargo, desde 1971, la mayoría de las monedas del mundo operan bajo un sistema fiduciario (o fiat), donde la moneda no está respaldada por una mercancía física, sino por la confianza que los ciudadanos y los mercados tienen en la capacidad del gobierno emisor para mantener su valor. En un sistema fiduciario, el valor de un billete no es intrínseco, sino contractual y socialmente aceptado. Esta transición, aunque liberó a los gobiernos para usar la política monetaria de manera más flexible, introdujo la vulnerabilidad del valor a factores psicológicos, políticos y a la mala gestión de la impresión de dinero.`,

    // CLAVE DE RESPUESTAS (según PDF: Lectura 1: B,B,B ; 2: B,B,B ; 3: B,B,B ; 4: C,B,B ; 5: C,C,C ; 6: B,B,C ; 7: B,B,C ; 8: C,C,B ; 9: B,B,C ; 10: B,C,C ; 11: B,B,C ; 12: B,C,B ; 13: B,B,C ; 14: C,B,C ; 15: C,B,B )

        [1,1,1], // 2

    // Estado de la app
    let indiceActual = 0; // 0..14
    // respuestasUsuario[lectura][pregunta] = índice de opción seleccionada (0..3) o null
    let respuestasUsuario = Array(15).fill().map(() => [null, null, null]);
    let calificado = false; // indica si se ha presionado calificar (para mostrar feedback)

    // Elementos DOM
    const elTitulo = document.getElementById('tituloLectura');

    // Renderizar tabla de clave fija
    function renderTablaClave() {
        let html = '';
        for (let l = 0; l < 15; l++) {
            html += '<tr><td>Lectura '+(l+1)+'</td>';
            for (let p = 0; p < 3; p++) {
                let letra = String.fromCharCode(65 + claveRespuestas[l][p]); // A=0, B=1, C=2, D=3
                html += `<td>${letra}</td>`;

    // guardar respuestas del DOM a estado
    function capturarRespuestasDeRadio() {
        if (!elPreguntas) return;
        const radios = document.querySelectorAll('input[type="radio"]:checked');
        radios.forEach(radio => {
            const pIdx = parseInt(radio.dataset.pregunta);
            const valor = parseInt(radio.value);
            if (!isNaN(pIdx) && !isNaN(valor)) {
                respuestasUsuario[indiceActual][pIdx] = valor;
            }
        });
    }

    // renderizar la lectura y preguntas actuales
    function renderizarActual() {
        const lectura = lecturas[indiceActual];
        elTitulo.innerText = lectura.titulo;
        elSubtitulo.innerText = lectura.subtitulo || '';
        elTexto.innerText = lectura.texto;

        // construir preguntas
        let htmlPreguntas = '';
        for (let i = 0; i < 3; i++) {
            const p = lectura.preguntas[i];
            const seleccionada = respuestasUsuario[indiceActual][i];
            htmlPreguntas += `<div class="pregunta-item" data-pregunta-global="${i}">`;
            htmlPreguntas += `<div class="pregunta-num">Pregunta ${i+1}</div>`;
            htmlPreguntas += `<div class="pregunta-texto">${p.pregunta}</div>`;
            htmlPreguntas += `<div class="opciones">`;
            p.opciones.forEach((opcion, idxOpc) => {
                const checked = (seleccionada === idxOpc) ? 'checked' : '';
                htmlPreguntas += `<label class="opcion-label">`;
                htmlPreguntas += `<input type="radio" name="preg_${indiceActual}_${i}" value="${idxOpc}" data-pregunta="${i}" ${checked}>`;
                htmlPreguntas += `${opcion}`;
                htmlPreguntas += `</label>`;
            });
            htmlPreguntas += `</div></div>`;
        }
        elPreguntas.innerHTML = htmlPreguntas;

        if (calificado) {

            elResultadoInd.style.display = 'none';
        }

        let totalRespondidas = 0;
        for (let l=0; l<15; l++) {

                if (respuestasUsuario[l][p] !== null) totalRespondidas++;
            }
        }
        let porcentaje = (totalRespondidas / 45) * 100;
        elProgreso.style.width = porcentaje + '%';

        // actualizar puntuación si calificado
        if (calificado) actualizarPuntuacionGlobal();
    }

    function mostrarFeedbackIndividual() {
        const lectura = lecturas[indiceActual];
        let aciertosLocal = 0;
        let totalPregs = 3;
        let html = `<strong>✅ Resultados lectura ${indiceActual+1}:</strong><br>`;
        for (let p = 0; p < 3; p++) {
            const respuestaUser = respuestasUsuario[indiceActual][p];
            const correcta = claveRespuestas[indiceActual][p];
            const esCorrecta = (respuestaUser === correcta);
            if (esCorrecta) aciertosLocal++;
            const letraUser = (respuestaUser !== null) ? String.fromCharCode(65 + respuestaUser) : '—';
            const letraCorrecta = String.fromCharCode(65 + correcta);
            html += `P${p+1}: ${letraUser} (correcta ${letraCorrecta}) ${esCorrecta ? '✓' : '✗'}<br>`;
        }
        html += `<span style="font-weight:700;">Aciertos: ${aciertosLocal}/3</span>`;
        elResultadoInd.innerHTML = html;
        elResultadoInd.style.display = 'block';
    }

    function actualizarPuntuacionGlobal() {
        let totalAciertos = 0;
        for (let l=0; l<15; l++) {
            for (let p=0; p<3; p++) {
                if (respuestasUsuario[l][p] === claveRespuestas[l][p]) totalAciertos++;
            }
        }
        puntuacionFinal.innerText = `Aciertos: ${totalAciertos}/45`;
    }

    // calificar todas: actualizar estado y feedback
    function calificarTodo() {
        capturarRespuestasDeRadio();
        calificado = true;
        mostrarFeedbackIndividual();
        actualizarPuntuacionGlobal();
    }

    function reiniciarSimulador() {
        respuestasUsuario = Array(15).fill().map(() => [null, null, null]);
        calificado = false;
        elResultadoInd.style.display = 'none';
        renderizarActual();
        actualizarPuntuacionGlobal();
    }

    // navegación
    function irAnterior() {
        if (indiceActual > 0) {
            capturarRespuestasDeRadio();
            indiceActual--;
            renderizarActual();
        }
    }
    function irSiguiente() {
        if (indiceActual < 14) {
            capturarRespuestasDeRadio();
            indiceActual++;
            renderizarActual();
        }
    }

    // event listeners
    prevBtn.addEventListener('click', irAnterior);
    nextBtn.addEventListener('click', irSiguiente);
    calificarBtn.addEventListener('click', calificarTodo);
    reiniciarBtn.addEventListener('click', reiniciarSimulador);

    // Inicializar
    renderizarActual();

    // al cambiar radio, actualizar estado (por si acaso)
    document.addEventListener('change', function(e) {
        if (e.target && e.target.type === 'radio') {
            const pIdx = e.target.dataset.pregunta;
            if (pIdx !== undefined) {
                const valor = parseInt(e.target.value);
                respuestasUsuario[indiceActual][pIdx] = valor;
            }
        }
    });
})();
</script>
</body>
</html>
