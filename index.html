                ["A) Que se pierda la información genética de las células somáticas.", "B) Que la tecnología se limite a curar enfermedades graves.", "C) La posibilidad de usar la modificación para mejorar rasgos no médicos, creando desigualdad social.", "D) Que la tecnología CRISPR sea prohibida internacionalmente."],
                ["A) Optimista, promoviendo el uso masivo de CRISPR.", "B) De alerta y llamado a la reflexión ética.", "C) Científico puro, sin preocupación moral.", "D) Indiferente."]
            ]
        },
        { // 9 - Laberinto soledad
            titulo: "Lectura 9: El laberinto de la soledad (Octavio Paz)",
            subtitulo: "",
            texto: `Para Octavio Paz, el mexicano moderno esconde su intimidad tras una máscara. El disimulo y la simulación son mecanismos de defensa frente a un mundo histórico que percibe como hostil. Esta actitud cerrada, este recelo, deriva de una doble orfandad: la ruptura con la tradición indígena y la lejanía de la cultura española. La soledad del mexicano no es solamente metafísica, sino histórica: producto de un trauma. La madurez, para Paz, no vendrá de negar esa herencia, sino de la confrontación sincera y la aceptación de su pasado.`,
            preguntas: [
                "Según Octavio Paz, ¿cuál es el mecanismo psicológico principal que utiliza el mexicano para protegerse?",
                "¿Qué diferencia establece el texto entre la soledad del mexicano y la soledad universal?",
                "¿Cuál es la clave que Paz sugiere para la madurez del mexicano?"
            ],
            opciones: [
                ["A) La extroversión constante.", "B) El disimulo y la simulación (la máscara).", "C) La confrontación violenta y directa.", "D) La negación total de la historia prehispánica."],

                ["A) Negar su herencia.", "B) Imitar la cultura de otros países.", "C) La confrontación sincera y la aceptación de su herencia histórica.", "D) El abandono de todas las ceremonias."]
            ]
        },
        { // 10 - Posverdad
            titulo: "Lectura 10: La era de la posverdad",
            subtitulo: "",
            texto: `El término "posverdad" designa la circunstancia en que los hechos objetivos influyen menos en la opinión pública que los llamamientos a la emoción y a las creencias personales. En este entorno, los discursos políticos o sociales apelan al sesgo de confirmación: la audiencia tiende a aceptar argumentos que refuercen sus convicciones previas, sin importar su veracidad. La posverdad erosiona el diálogo racional y la deliberación democrática, ya que el debate se desplaza de la evidencia a la afinidad emocional.`,
            preguntas: [
                "¿Cuál es la característica definitoria de la 'posverdad'?",
                "¿Qué herramienta retórica utiliza la posverdad para movilizar a la audiencia?",

            ],
            opciones: [
                ["A) La falta de acceso a la información objetiva.", "B) Que la verdad es secundaria frente a la emoción y las creencias personales.", "C) Que todos los discursos políticos son falsos.", "D) La constante verificación de los datos por parte del público."],
                ["A) La apelación a hechos objetivos.", "B) El principio de falsación.", "C) La apelación al sesgo de confirmación.", "D) El diálogo racional."],

            ]
        },
        { // 11 - Paradoja elección
            titulo: "Lectura 11: La paradoja de la elección",
            subtitulo: "",
            texto: `Contrario a la creencia popular de que tener más opciones es siempre mejor, la investigación en psicología conductual ha revelado la "paradoja de la elección". Si bien un número limitado de opciones es beneficioso, un exceso de alternativas puede conducir a la parálisis de la decisión, haciendo que el consumidor se sienta abrumado e incapaz de elegir. Más allá de la parálisis, el exceso de elección también reduce la satisfacción posterior. Cuando finalmente se toma una decisión entre muchas, el individuo tiende a lamentarse por las opciones no elegidas (FOMO). El punto óptimo no es la maximización, sino la satisfacción (satisficing): escoger una opción lo "suficientemente buena".`,
            preguntas: [
                "¿Qué efecto principal tiene el exceso de opciones en el individuo?",
                "¿Qué implicación tiene la insatisfacción posterior a la elección?",
                "El autor sugiere que el punto óptimo es el satisficing, lo cual implica:"
            ],
            opciones: [
                ["A) Aumenta drásticamente la satisfacción.", "B) Conduce a la parálisis y reduce la satisfacción posterior.", "C) Simplifica el proceso de elección.", "D) Garantiza que la opción sea la mejor."],
                ["A) El individuo culpa al producto.", "B) El individuo se arrepiente por las opciones no elegidas (FOMO).", "C) Siente que debió invertir menos tiempo.", "D) Siempre alcanza el satisficing."],
                ["A) Buscar la opción absolutamente mejor.", "B) Conformarse con la primera opción.", "C) Elegir la opción 'suficientemente buena' para satisfacer los criterios mínimos.", "D) Evitar tomar decisiones importantes."]
            ]
        },
        { // 12 - Moneda fiduciaria
            titulo: "Lectura 12: El oro y la naturaleza fiduciaria de la moneda",
            subtitulo: "",
            texto: `Históricamente, el valor de la moneda estaba ligado al estándar oro: cada unidad de papel moneda representaba una cantidad fija de metal precioso en las reservas de un banco central. Este sistema limitaba la inflación, ya que el gobierno no podía imprimir más dinero del que respaldaba en oro. Sin embargo, desde 1971, la mayoría de las monedas operan bajo un sistema fiduciario, donde la moneda no está respaldada por una mercancía física, sino por la confianza que los ciudadanos y los mercados tienen en el gobierno emisor. Esta transición introdujo la vulnerabilidad del valor a factores psicológicos y políticos.`,
            preguntas: [
                "¿Cuál es la principal diferencia entre el estándar oro y el sistema fiduciario?",
                "En el sistema fiduciario, ¿qué confiere valor al dinero?",
                "¿Qué vulnerabilidad introdujo el cambio al sistema fiduciario?"
            ],
            opciones: [
                ["A) El oro se basa en el valor del papel; el fiduciario en el metal.", "B) El oro limita la impresión de dinero; el fiduciario se basa en la confianza.", "C) El oro fue abolido en el siglo XIX.", "D) El fiduciario es siempre más estable."],
                ["A) La cantidad de oro que lo respalda.", "B) La deuda del gobierno.", "C) La confianza en la estabilidad del gobierno emisor.", "D) El tamaño físico del billete."],
                ["A) La limitación de la política monetaria.", "B) La dependencia del valor a la confianza y la gestión política.", "C) La imposibilidad de imprimir dinero.", "D) Un sistema basado solo en mercancías."]
            ]
        },
        { // 13 - Brutalismo
            titulo: "Lectura 13: La estética del brutalismo en la arquitectura",
            subtitulo: "",
            texto: `El brutalismo, estilo arquitectónico que floreció desde la década de 1950 hasta mediados de 1970, es frecuentemente mal entendido. Lejos de ser "brutal" en el sentido de crueldad, su nombre proviene del francés béton brut (hormigón crudo). Este estilo se caracteriza por dejar al descubierto las superficies de hormigón sin pulir, revelando honestamente la naturaleza del material. El movimiento tenía una intención social profunda: buscar un estilo austero y democrático que pudiera ser producido en masa para albergar a las clases trabajadoras. El objetivo era la funcionalidad ética: la forma debía reflejar su propósito sin ornamentación.`,
            preguntas: [
                "¿De dónde proviene el término 'brutalismo' en la arquitectura?",
                "La 'funcionalidad ética' en el brutalismo se refiere a:",
                "¿Cuál fue una de las principales intenciones sociales del brutalismo?"
            ],
            opciones: [
                ["A) De la intención de crear edificios violentos.", "B) De la palabra francesa béton brut (hormigón crudo).", "C) De la dureza de las líneas rectas.", "D) Del nombre del arquitecto."],
                ["A) Usar materiales caros.", "B) Que la forma refleje su propósito sin ornamentación.", "C) Construir solo para la élite.", "D) Usar vidrio y acero."],
                ["A) Crear estructuras imposibles de replicar.", "B) Diseñar espacios opresivos.", "C) Construir viviendas sociales de bajo costo de manera democrática.", "D) Representar el poder del Estado."]
            ]
        },
        { // 14 - Objetividad algorítmica
            titulo: "Lectura 14: La ilusión de la objetividad algorítmica",
            subtitulo: "",
            texto: `Existe una creencia extendida de que los algoritmos, al ser programas de software, son inherentemente objetivos y justos, libres de sesgos humanos. Sin embargo, esta visión es una ilusión peligrosa. Los algoritmos no nacen en un vacío ético; se entrenan con datos históricos que reflejan sesgos sociales preexistentes. Un algoritmo de préstamo bancario que aprende de patrones históricos donde ciertas minorías recibieron menos préstamos tenderá a replicar esa discriminación. La objetividad del algoritmo es, en realidad, la objetivación del sesgo. Es crucial implementar auditorías éticas de los datos de entrenamiento.`,
            preguntas: [
                "¿Cuál es la tesis principal del autor?",
                "¿Cómo replica un algoritmo un sesgo social?",
                "La frase 'objetivación del sesgo' sugiere que:"
            ],
            opciones: [
                ["A) Los algoritmos son siempre objetivos.", "B) Deben prohibirse.", "C) La objetividad algorítmica es una ilusión porque replican sesgos sociales.", "D) El sesgo solo existe en algoritmos bancarios."],
                ["A) Por introducción manual de prejuicios.", "B) Aprendiendo de patrones en datos históricos con discriminación.", "C) Negándose a funcionar sin datos frescos.", "D) Creando conflictos intencionalmente."],
                ["A) El sesgo se vuelve evidente.", "B) El algoritmo elimina errores humanos.", "C) El sesgo se legitima como verdad matemática imparcial.", "D) El objetivo es crear justicia social."]
            ]
        },
        { // 15 - Expresionismo
            titulo: "Lectura 15: Expresionismo alemán",
            subtitulo: "",
            texto: `El Expresionismo Alemán (principios del XX) fue un movimiento cultural que reaccionó contra el Impresionismo. Mientras que el Impresionismo intentaba reflejar la luz y la impresión visual, el Expresionismo buscaba plasmar la emoción, la angustia y la realidad interna del artista. Influido por la alienación urbana, la incertidumbre y la Gran Guerra, el arte expresionista empleaba colores violentos, pinceladas agresivas y distorsión de la forma. Más que representar la realidad externa, buscaba expresar el mundo interior.`,
            preguntas: [
                "¿Cuál fue el objetivo principal del Expresionismo Alemán?",
                "¿Cuál fue el contexto social que influyó en el Expresionismo?",
                "¿Qué recurso estético empleaban los expresionistas?"
            ],
            opciones: [
                ["A) Representar la belleza natural.", "B) Reflejar la luz como el ojo humano.", "C) Plasmar la emoción y la realidad interna.", "D) Crear arte fácil de entender."],
                ["A) Paz y prosperidad.", "B) Angustia existencial, alienación y la Gran Guerra.", "C) Regreso a lo clásico.", "D) Introducción de la fotografía."],
                ["A) Representación fiel del cuerpo.", "B) Colores violentos y distorsión de la forma.", "C) Técnica del sfumato.", "D) Paisajes rurales idílicos."]
            ]
        }
    ];

    // ==============================================================
    // CLAVE DE RESPUESTAS (según PDF)
    // ==============================================================
    const clave = [
        [1,1,1], // lectura 1 (B,B,B)
        [1,1,1], // 2 (B,B,B)
        [1,1,1], // 3 (B,B,B)
        [2,1,1], // 4 (C,B,B)
        [2,2,2], // 5 (C,C,C)
        [1,1,2], // 6 (B,B,C)
        [1,1,2], // 7 (B,B,C)
        [2,2,1], // 8 (C,C,B)
        [1,1,2], // 9 (B,B,C)
        [1,2,2], //10 (B,C,C)
        [1,1,2], //11 (B,B,C)
        [1,2,1], //12 (B,C,B)
        [1,1,2], //13 (B,B,C)
        [2,1,2], //14 (C,B,C)
        [2,1,1]  //15 (C,B,B)
    ];

    // Estado de la aplicación
    let lecturaActual = 0;
    let respuestas = Array(15).fill().map(() => [null, null, null]);
    let finalizado = false;

    // Elementos DOM
    const navegacionExamen = document.getElementById('navegacionExamen');
    const panelResultados = document.getElementById('panelResultados');
    const botonesExamen = document.getElementById('botonesExamen');
    const btnFinalizar = document.getElementById('btnFinalizar');
    const btnReiniciar = document.getElementById('btnReiniciar');
    const btnReintentar = document.getElementById('btnReintentar');
    const btnSalir = document.getElementById('btnSalir');
    const btnAnterior = document.getElementById('btnAnterior');
    const btnSiguiente = document.getElementById('btnSiguiente');
    const lecturaIndicador = document.getElementById('lecturaIndicador');
    const tituloLectura = document.getElementById('tituloLectura');
    const subtituloLectura = document.getElementById('subtituloLectura');
    const textoLectura = document.getElementById('textoLectura');
    const contenedorPreguntas = document.getElementById('contenedorPreguntas');
    const barraProgreso = document.getElementById('barraProgreso');
    const tablaDetalleBody = document.getElementById('tablaDetalleBody');
    const puntajeTotal = document.getElementById('puntajeTotal');

    // Funciones
    function guardarRespuestasActuales() {
        const radios = contenedorPreguntas.querySelectorAll('input[type="radio"]:checked');
        radios.forEach(radio => {
            const preguntaIdx = parseInt(radio.dataset.pregunta);
            const valor = parseInt(radio.value);
            if (!isNaN(preguntaIdx) && !isNaN(valor)) {
                respuestas[lecturaActual][preguntaIdx] = valor;
            }
        });
    }

    function renderizarLectura() {
        const l = lecturas[lecturaActual];
        tituloLectura.textContent = l.titulo;
        subtituloLectura.textContent = l.subtitulo || '';
        textoLectura.textContent = l.texto;

        let html = '';
        for (let i = 0; i < 3; i++) {
            const seleccionada = respuestas[lecturaActual][i];
            html += `<div class="pregunta">`;
            html += `<div class="num-pregunta">Pregunta ${i+1}</div>`;
            html += `<div class="texto-pregunta">${l.preguntas[i]}</div>`;
            html += `<div class="opciones">`;
            l.opciones[i].forEach((opcion, idx) => {
                html += `<label class="opcion">`;
                html += `<input type="radio" name="p_${i}" value="${idx}" data-pregunta="${i}" ${seleccionada === idx ? 'checked' : ''}>`;
                html += opcion;
                html += `</label>`;
            });
            html += `</div></div>`;
        }
        contenedorPreguntas.innerHTML = html;

        lecturaIndicador.textContent = `Lectura ${lecturaActual+1}/15`;
        btnAnterior.disabled = (lecturaActual === 0);
        btnSiguiente.disabled = (lecturaActual === 14);

        // Actualizar barra de progreso
        const totalRespondidas = respuestas.flat().filter(r => r !== null).length;
        barraProgreso.style.width = (totalRespondidas / 45 * 100) + '%';
    }

    function mostrarResultados() {
        guardarRespuestasActuales();
        finalizado = true;
        navegacionExamen.classList.add('oculto');
        botonesExamen.classList.add('oculto');
        panelResultados.classList.remove('oculto');

        let totalAciertos = 0;
        let filas = '';
        for (let l = 0; l < 15; l++) {
            let aciertosLectura = 0;
            filas += '<tr><td>' + (l+1) + '</td>';
            for (let p = 0; p < 3; p++) {
                const user = respuestas[l][p];
                const correcta = clave[l][p];
                const letraUser = user !== null ? String.fromCharCode(65 + user) : '—';
                const letraCorrecta = String.fromCharCode(65 + correcta);
                const clase = (user === correcta) ? 'acierto' : 'error';
                filas += `<td class="${clase}">${letraUser} / ${letraCorrecta}</td>`;
                if (user === correcta) aciertosLectura++;
            }
            filas += `<td>${aciertosLectura}/3</td>`;
            totalAciertos += aciertosLectura;
        }
        tablaDetalleBody.innerHTML = filas;
        puntajeTotal.textContent = `${totalAciertos}/45`;
    }

    function reiniciarSimulacro() {
        respuestas = Array(15).fill().map(() => [null, null, null]);
        lecturaActual = 0;
        finalizado = false;
        navegacionExamen.classList.remove('oculto');
        botonesExamen.classList.remove('oculto');
        panelResultados.classList.add('oculto');
        renderizarLectura();
    }

    function finalizarApp() {
        alert('Simulador finalizado. ¡Gracias por practicar!');
    }

    // Event listeners
    btnAnterior.addEventListener('click', () => {
        guardarRespuestasActuales();
        if (lecturaActual > 0) {
            lecturaActual--;
            renderizarLectura();
        }
    });

    btnSiguiente.addEventListener('click', () => {
        guardarRespuestasActuales();
        if (lecturaActual < 14) {
            lecturaActual++;
            renderizarLectura();
        }
    });

    btnFinalizar.addEventListener('click', mostrarResultados);
    btnReiniciar.addEventListener('click', reiniciarSimulacro);
    btnReintentar.addEventListener('click', reiniciarSimulacro);
    btnSalir.addEventListener('click', finalizarApp);

    // Guardar respuestas al cambiar radio
    document.addEventListener('change', (e) => {
        if (e.target.matches('input[type="radio"]')) {
            const preguntaIdx = parseInt(e.target.dataset.pregunta);
            const valor = parseInt(e.target.value);
            if (!isNaN(preguntaIdx) && !isNaN(valor)) {
                respuestas[lecturaActual][preguntaIdx] = valor;
                const totalRespondidas = respuestas.flat().filter(r => r !== null).length;
                barraProgreso.style.width = (totalRespondidas / 45 * 100) + '%';
            }
        }
    });

    // Inicializar
    renderizarLectura();
})();
</script>
</body>
</html>
